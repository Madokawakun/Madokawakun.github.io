<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サーバールール</title>

<style>
body {
    font-family: Arial, sans-serif;
    line-height: 1.8;
    margin: 0;
    padding: 40px;

    background-image: url("background.png");
    background-repeat: repeat;
    background-size: 256px;
}

/* 全体を少し暗くして可読性アップ */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: -1;
}

/* 中央コンテナ */
.container {
    max-width: 900px;
    margin: auto;
}

/* タイトル */
h1 {
    text-align: center;
    color: white;
    margin-bottom: 30px;
    text-shadow: 0 0 10px rgba(0,0,0,0.8);
}

/* ルールボックス */
details {
    margin-bottom: 20px;
    border-radius: 10px;
    background-color: rgba(255, 255, 255, 0.92);
    padding: 15px 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

summary {
    font-weight: bold;
    cursor: pointer;
    font-size: 1.2em;
    padding: 8px 0;
}

ul {
    margin-top: 10px;
    padding-left: 20px;
}

li {
    margin-bottom: 6px;
}

/* 最終改定日 */
.footer {
    text-align: center;
    color: white;
    margin-top: 40px;
    font-weight: bold;
    text-shadow: 0 0 8px rgba(0,0,0,0.8);
}
</style>
</head>

<body>

<div class="container">

<h1>サーバールール</h1>

<!-- ここに今の details ブロックをそのまま置いてOK -->

<p class="footer">最終改定日：2026/03/02</p>

</div>

</body>
</html>
